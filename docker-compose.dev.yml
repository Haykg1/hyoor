services:
  postgres:
    ports:
      - "5432:5432"

  localstack:
    image: localstack/localstack:4
    restart: unless-stopped
    ports:
      - "4566:4566"
      - "4510-4559:4510-4559"
    environment:
      SERVICES: s3
      DEBUG: 0
      AWS_DEFAULT_REGION: eu-central-1
      AWS_S3_BUCKET: properties
      LOCALSTACK_HOST: localhost.localstack.cloud:4566
      DISABLE_CUSTOM_CORS_S3: 1
      EXTRA_CORS_ALLOWED_ORIGINS: http://localhost:3000
    volumes:
      - localstack_data:/var/lib/localstack
      - ./scripts/localstack-init.sh:/etc/localstack/init/ready.d/init.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "awslocal s3api list-buckets >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.dev
    volumes:
      - ./apps/api/src:/app/apps/api/src
      - ./packages:/app/packages
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:password@postgres:5432/appdb
      PORT: 3001
      FRONTEND_URL: http://localhost:3000
      AWS_ENDPOINT_URL: http://localhost.localstack.cloud:4566
    env_file:
      - apps/api/.env
    extra_hosts:
      - "localhost.localstack.cloud:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      localstack:
        condition: service_healthy
    command: sh -c "sh packages/database/scripts/docker-init.sh && pnpm --filter @repo/shared build && pnpm --filter api start:dev"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.dev
    volumes:
      - ./apps/web/src:/app/apps/web/src
      - ./apps/web/public:/app/apps/web/public
    environment:
      NODE_ENV: development
    command: pnpm --filter web dev

volumes:
  localstack_data:
